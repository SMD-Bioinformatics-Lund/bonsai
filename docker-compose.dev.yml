# For development
# - volume mount app folders to container.
# - requires rebuilding containers when changing dependencies.
#
# usage:
# (sudo) docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# (sudo) docker-compose -f docker-compose.yml -f docker-compose.dev.yml down
services: 

  # ─────────────────────────────────────────────
  # Initialisation
  # ─────────────────────────────────────────────


  mongo-init:
    image: mongo:4.4.22
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint: |
      mongo mongodb:27017 --eval "
        try {
          rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongodb:27017'}]});
          print('Replica set initialized');
        } catch (e) {
          if (e.code === 23) {
            print('Replica set already initialized');
          } else {
            throw e;
          }
        }
      "
    networks: [bonsai]
    restart: on-failure

  bootstrap:
    image: clinicalgenomicslund/bonsai-prp:dev
    profiles: ["init", "e2e"]
    env_file: docker-compose.env
    depends_on:
      api:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    environment:
      MONGODB_URI: mongodb://mongodb:27017?replicaSet=rs0
      BONSAI_API: http://api:8000
    volumes:
      - ./bootstrap/default.yml:/bootstrap/default.yml:ro
    command: prp bonsai bootstrap /bootstrap/default.yml
    restart: "no"
    networks: [bonsai]
  
  # ─────────────────────────────────────────────
  # Data seeder
  # ─────────────────────────────────────────────

  test-data-seeder:
    image: clinicalgenomicslund/bonsai-prp:dev
    profiles: ["init", "e2e"]
    env_file: docker-compose.env
    depends_on:
      api:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    environment:
      BONSAI_API: http://api:8000
    volumes:
      - ./e2e_tests/fixtures/smoke:/data:ro
    command: prp bonsai upload /data/tb_sample_1/tb_sample_1.manifest.yml
    restart: "no"
    networks: [bonsai]

  # ─────────────────────────────────────────────
  # Development conveniences
  # ─────────────────────────────────────────────

  frontend:
    build: 
      target: development
    environment:
      API_INTERNAL_URL: http://api:8000
      API_EXTERNAL_URL: http://localhost:8001
    develop:
      watch: 
        - path: ./frontend/setup.cfg
          action: rebuild
        - path: ./frontend/Dockerfile
          action: rebuild
        - path: ./frontend/bonsai_app
          target: /app/frontend/bonsai_app
          action: sync

  api:
    build: 
      target: development
    environment: 
      NOTIFICATION_SERVICE_API: http://notification_service:8000/
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    develop:
      watch: 
        - path: ./api/Dockerfile
          action: rebuild
        - path: ./api/setup.cfg
          action: rebuild
        - path: ./api/bonsai_api
          target: /app/api/bonsai_api
          action: sync
        - path: ./libs/api_client/pyproject.toml
          action: rebuild
        - path: ./libs/api_client/api_client
          target: /app/api_client/api_client
          action: sync

  minhash_service:
    build: 
      target: development
    develop:
      watch: 
        - path: ./minhash_service/pyproject.toml
          action: rebuild
        - path: ./minhash_service/Dockerfile
          action: rebuild
        - path: ./minhash_service/minhash_service
          target: /app/minhash_service/minhash_service
          action: sync
        - path: ./libs/api_client/pyproject.toml
          action: rebuild
        - path: ./libs/api_client/api_client
          target: /app/api_client/api_client
          action: sync

  minhash_cron_service:
    build: 
      target: development
    develop:
      watch: 
        - path: ./minhash_service/pyproject.toml
          action: rebuild
        - path: ./minhash_service/Dockerfile
          action: rebuild
        - path: ./minhash_service/minhash_service
          target: /app/minhash_service/minhash_service
          action: sync
        - path: ./libs/api_client/pyproject.toml
          action: rebuild
        - path: ./libs/api_client/api_client
          target: /app/api_client/api_client
          action: sync
  
  allele_cluster_service:
    build: 
      target: development
    develop:
      watch: 
        - path: ./allele_cluster_service/setup.cfg
          action: rebuild
        - path: ./allele_cluster_service/Dockerfile
          action: rebuild
        - path: ./allele_cluster_service/allele_cluster_service
          target: /app/allele_cluster_service/allele_cluster_service
          action: sync
  
  ska_service:
    build:
      target: development
    environment:
      LOG_LEVEL: debug
    develop:
      watch: 
        - path: ./ska_service/setup.cfg
          action: rebuild
        - path: ./ska_service/Dockerfile
          action: rebuild
        - path: ./ska_service/ska_service
          target: /app/ska_service/ska_service
          action: sync

  notification_service:
    build: 
      target: development
    environment:
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
    ports: 
      - "8005:8000"
    develop:
      watch: 
        - path: ./notification_service/pyproject.toml
          action: rebuild
        - path: ./notification_service/Dockerfile
          action: rebuild
        - path: ./notification_service/bonsai_notification
          target: /app/notification_service/bonsai_notification
          action: sync
    depends_on:
      - mailhog

  audit_log_service:
    build: 
      target: development
    ports: 
      - "8004:8000"
    develop:
      watch:
        - path: ./audit_log_service/pyproject.toml
          action: rebuild
        - path: ./audit_log_service/Dockerfile
          action: rebuild
        - path: ./audit_log_service
          action: sync
          target: /app/src/

  mailhog:
    image: mailhog/mailhog:latest
    logging:
      driver: 'none'  # disable saving logs
    ports:
      - 1025:1025 # smtp server
      - 8025:8025 # web ui
    networks: [bonsai]

  # ─────────────────────────────────────────────
  # End‑to‑end testing
  # ─────────────────────────────────────────────
  
  chrome:
    image: selenium/standalone-chrome
    profiles: ["e2e"]
    shm_size: 2gb
    ports:
      - "4444:4444"
      - "7900:7900"
    networks: [bonsai]

  e2e-tests:
    build: e2e_tests
    profiles: ["e2e"]
    depends_on:
      chrome:
        condition: service_started
      frontend:
        condition: service_started
      api:
        condition: service_healthy
    volumes:
      - ./reports:/app/reports
    restart: "no"
    networks: [bonsai]
